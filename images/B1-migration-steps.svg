<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220">
  <!-- Background -->
  <rect width="720" height="220" fill="#f8fafc" rx="16" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#0f172a">LocalStack → Floci: The Five Migration Steps</text>
  <text x="360" y="54" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#94a3b8">For most teams, Step 1 alone fixes the broken pipeline</text>

  <!-- Connector lines between steps -->
  <line x1="134" y1="122" x2="152" y2="122" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="152,117 162,122 152,127" fill="#cbd5e1"/>
  <line x1="270" y1="122" x2="288" y2="122" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="288,117 298,122 288,127" fill="#cbd5e1"/>
  <line x1="406" y1="122" x2="424" y2="122" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="424,117 434,122 424,127" fill="#cbd5e1"/>
  <line x1="542" y1="122" x2="560" y2="122" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="560,117 570,122 560,127" fill="#cbd5e1"/>

  <!-- ═══ STEP 1 ═══ -->
  <rect x="16" y="72" width="118" height="100" rx="8" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <rect x="16" y="72" width="118" height="28" rx="8" fill="#3b82f6"/>
  <rect x="16" y="92" width="118" height="8" fill="#3b82f6"/>
  <text x="75" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white">STEP 1</text>
  <text x="75" y="116" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#0f172a">docker-compose</text>
  <text x="75" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Swap image name</text>
  <text x="75" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">localstack →</text>
  <text x="75" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#3b82f6">hectorvent/floci</text>

  <!-- ═══ STEP 2 ═══ -->
  <rect x="162" y="72" width="118" height="100" rx="8" fill="white" stroke="#6366f1" stroke-width="2"/>
  <rect x="162" y="72" width="118" height="28" rx="8" fill="#6366f1"/>
  <rect x="162" y="92" width="118" height="8" fill="#6366f1"/>
  <text x="221" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white">STEP 2</text>
  <text x="221" y="116" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#0f172a">Remove Auth Token</text>
  <text x="221" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Delete secret from</text>
  <text x="221" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">GitHub/GitLab CI</text>
  <text x="221" y="164" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#6366f1">No token needed</text>

  <!-- ═══ STEP 3 ═══ -->
  <rect x="298" y="72" width="118" height="100" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="298" y="72" width="118" height="28" rx="8" fill="#8b5cf6"/>
  <rect x="298" y="92" width="118" height="8" fill="#8b5cf6"/>
  <text x="357" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white">STEP 3</text>
  <text x="357" y="116" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#0f172a">SDK Endpoints</text>
  <text x="357" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Usually no change.</text>
  <text x="357" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Same port 4566,</text>
  <text x="357" y="164" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">same endpoint_url</text>

  <!-- ═══ STEP 4 ═══ -->
  <rect x="434" y="72" width="118" height="100" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <rect x="434" y="72" width="118" height="28" rx="8" fill="#f59e0b"/>
  <rect x="434" y="92" width="118" height="8" fill="#f59e0b"/>
  <text x="493" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white">STEP 4  ⚠</text>
  <text x="493" y="116" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#0f172a">IAM Gap</text>
  <text x="493" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Find AccessDenied</text>
  <text x="493" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">assertions. Skip or</text>
  <text x="493" y="164" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#92400e">move to AWS sandbox</text>

  <!-- ═══ STEP 5 ═══ -->
  <rect x="570" y="72" width="134" height="100" rx="8" fill="white" stroke="#22c55e" stroke-width="2"/>
  <rect x="570" y="72" width="134" height="28" rx="8" fill="#22c55e"/>
  <rect x="570" y="92" width="134" height="8" fill="#22c55e"/>
  <text x="637" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white">STEP 5</text>
  <text x="637" y="116" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#0f172a">Verify Lambda</text>
  <text x="637" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Pre-pull runtime images</text>
  <text x="637" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">if Lambda is in use.</text>
  <text x="637" y="164" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#15803d">Real containers run</text>

  <!-- Footer note -->
  <text x="360" y="196" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Step 4 is the only one that requires a judgement call — IAM assertions that expect AccessDenied will silently pass on Floci</text>
</svg>
