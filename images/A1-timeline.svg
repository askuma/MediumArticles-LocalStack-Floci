<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 660" width="740" height="660">
  <!-- Background -->
  <rect width="740" height="660" fill="#f8fafc" rx="16" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="370" y="40" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="700" fill="#0f172a">LocalStack Community Edition — How It Ended</text>
  <text x="370" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#94a3b8">March 2016 to April 2026</text>

  <!-- Highlight bands (drawn first so spine goes on top) -->
  <rect x="16" y="380" width="708" height="94" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <rect x="16" y="488" width="708" height="88" rx="8" fill="#fff1f2" stroke="#fecaca" stroke-width="1"/>

  <!-- Vertical spine -->
  <line x1="200" y1="72" x2="200" y2="545" stroke="#cbd5e1" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ═══ EVENT 1: 2016–2024 | Green ═══ -->
  <circle cx="200" cy="96" r="9" fill="#22c55e" stroke="#f0fdf4" stroke-width="3"/>
  <text x="186" y="93" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#94a3b8">2016</text>
  <text x="186" y="107" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#94a3b8">– 2024</text>
  <text x="220" y="93" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#0f172a">Free and open-source  (Apache 2.0)</text>
  <text x="220" y="112" font-family="system-ui,sans-serif" font-size="13" fill="#475569">No authentication. No CI limits. Embedded in thousands of engineering teams'</text>
  <text x="220" y="128" font-family="system-ui,sans-serif" font-size="13" fill="#475569">pipelines, developer environments, and onboarding scripts.</text>

  <!-- ═══ EVENT 2: 2024–2025 | Amber ═══ -->
  <circle cx="200" cy="170" r="9" fill="#f59e0b" stroke="#fffbeb" stroke-width="3"/>
  <text x="186" y="167" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#94a3b8">2024</text>
  <text x="186" y="181" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#94a3b8">– 2025</text>
  <text x="220" y="168" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#0f172a">VC funding. Paid tier grows quietly.</text>
  <text x="220" y="186" font-family="system-ui,sans-serif" font-size="13" fill="#475569">Community edition untouched. No warnings issued.</text>

  <!-- ═══ EVENT 3: Dec 2025 | Orange ═══ -->
  <circle cx="200" cy="232" r="9" fill="#f97316" stroke="#fff7ed" stroke-width="3"/>
  <text x="186" y="229" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Dec</text>
  <text x="186" y="243" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#94a3b8">2025</text>
  <text x="220" y="230" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#0f172a">Community edition end announced</text>
  <text x="220" y="248" font-family="system-ui,sans-serif" font-size="13" fill="#475569">"Too expensive to sustain a free, unauthenticated tier." Co-CEOs announce</text>
  <text x="220" y="264" font-family="system-ui,sans-serif" font-size="13" fill="#475569">consolidation into a single paid-tier image.</text>

  <!-- ═══ EVENT 4: Feb 2026 | Red-orange ═══ -->
  <circle cx="200" cy="312" r="9" fill="#ef4444" stroke="#fef2f2" stroke-width="3"/>
  <text x="186" y="309" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Feb</text>
  <text x="186" y="323" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#94a3b8">2026</text>
  <text x="220" y="310" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#0f172a">Pricing restructure</text>
  <text x="220" y="328" font-family="system-ui,sans-serif" font-size="13" fill="#475569">Hobby tier: free for non-commercial use only. Paid plans from $39 / seat / month.</text>
  <text x="220" y="346" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#dc2626">CI use not included in the free tier.</text>

  <!-- ═══ EVENT 5: Mar 23, 2026 | Breaking ═══ -->
  <circle cx="200" cy="424" r="11" fill="#dc2626" stroke="#fef2f2" stroke-width="3"/>
  <line x1="194.5" y1="418.5" x2="205.5" y2="429.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="205.5" y1="418.5" x2="194.5" y2="429.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <text x="185" y="418" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Mar 23</text>
  <text x="185" y="432" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#94a3b8">2026</text>
  <rect x="220" y="388" width="174" height="24" rx="12" fill="#dc2626"/>
  <text x="307" y="404" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" letter-spacing="0.5">⚠  PIPELINES BREAK</text>
  <text x="220" y="438" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#0f172a">Repository archived. Auth token required.</text>
  <text x="220" y="456" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">docker pull without LOCALSTACK_AUTH_TOKEN → broken immediately.</text>

  <!-- ═══ EVENT 6: Apr 6, 2026 | No recovery ═══ -->
  <circle cx="200" cy="524" r="11" fill="#991b1b" stroke="#fff1f2" stroke-width="3"/>
  <line x1="194.5" y1="518.5" x2="205.5" y2="529.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="205.5" y1="518.5" x2="194.5" y2="529.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <text x="185" y="518" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Apr 6</text>
  <text x="185" y="532" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#94a3b8">2026</text>
  <rect x="220" y="494" width="152" height="24" rx="12" fill="#991b1b"/>
  <text x="296" y="510" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" letter-spacing="0.5">✕  NO WAY BACK</text>
  <text x="220" y="538" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#0f172a">Grace period bypass flag expires.</text>
  <text x="220" y="556" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">Zero workaround remaining for unauthenticated use.</text>

  <!-- ═══ Legend ═══ -->
  <rect x="16" y="590" width="708" height="52" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="38" y="621" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1">SEVERITY</text>
  <circle cx="120" cy="617" r="7" fill="#22c55e"/>
  <text x="133" y="621" font-family="system-ui,sans-serif" font-size="12" fill="#475569">Stable</text>
  <circle cx="196" cy="617" r="7" fill="#f59e0b"/>
  <text x="209" y="621" font-family="system-ui,sans-serif" font-size="12" fill="#475569">Caution</text>
  <circle cx="284" cy="617" r="7" fill="#f97316"/>
  <text x="297" y="621" font-family="system-ui,sans-serif" font-size="12" fill="#475569">Warning</text>
  <circle cx="372" cy="617" r="7" fill="#ef4444"/>
  <text x="385" y="621" font-family="system-ui,sans-serif" font-size="12" fill="#475569">Critical</text>
  <circle cx="456" cy="617" r="7" fill="#dc2626"/>
  <text x="469" y="621" font-family="system-ui,sans-serif" font-size="12" fill="#475569">Breaking</text>
  <circle cx="558" cy="617" r="7" fill="#991b1b"/>
  <text x="571" y="621" font-family="system-ui,sans-serif" font-size="12" fill="#475569">No recovery</text>
</svg>
