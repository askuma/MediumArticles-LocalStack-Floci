<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 450" width="720" height="450">
  <rect width="720" height="450" fill="#f8fafc" rx="16" stroke="#e2e8f0" stroke-width="1"/>

  <text x="360" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="700" fill="#0f172a">Risk Profile — Both Options Have Real Risks</text>
  <text x="360" y="54" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#94a3b8">The risks are different in kind, not absent on either side</text>

  <!-- Header row -->
  <rect x="16" y="64" width="688" height="28" rx="4" fill="#f1f5f9"/>
  <text x="126" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#475569">RISK FACTOR</text>
  <text x="368" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#475569">LocalStack (Paid)</text>
  <text x="594" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#475569">Floci</text>
  <!-- Column dividers in header -->
  <line x1="244" y1="64" x2="244" y2="92" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="488" y1="64" x2="488" y2="92" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ── ROW 1: Pricing increase risk ── -->
  <rect x="16" y="96" width="688" height="46" rx="0" fill="white"/>
  <text x="28" y="124" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0f172a">Pricing increase risk</text>
  <circle cx="262" cy="119" r="8" fill="#dc2626"/>
  <text x="278" y="123" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626" font-weight="600">HIGH</text>
  <text x="278" y="138" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Active — paid model still maturing</text>
  <circle cx="506" cy="119" r="8" fill="#16a34a"/>
  <text x="522" y="123" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a" font-weight="600">NONE</text>
  <text x="522" y="138" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">MIT — no commercial model</text>

  <line x1="16" y1="142" x2="704" y2="142" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="244" y1="96" x2="244" y2="142" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="488" y1="96" x2="488" y2="142" stroke="#f1f5f9" stroke-width="1"/>

  <!-- ── ROW 2: Feature gating risk ── -->
  <rect x="16" y="142" width="688" height="46" rx="0" fill="#fafafa"/>
  <text x="28" y="170" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0f172a">Feature gating risk</text>
  <circle cx="262" cy="165" r="8" fill="#dc2626"/>
  <text x="278" y="169" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626" font-weight="600">HIGH</text>
  <text x="278" y="184" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Paid tiers already differentiated</text>
  <circle cx="506" cy="165" r="8" fill="#16a34a"/>
  <text x="522" y="169" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a" font-weight="600">NONE</text>
  <text x="522" y="184" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">No paid tier — all features free</text>

  <line x1="16" y1="188" x2="704" y2="188" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="244" y1="142" x2="244" y2="188" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="488" y1="142" x2="488" y2="188" stroke="#f1f5f9" stroke-width="1"/>

  <!-- ── ROW 3: Project stalling risk ── -->
  <rect x="16" y="188" width="688" height="46" rx="0" fill="white"/>
  <text x="28" y="216" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0f172a">Project stalling risk</text>
  <circle cx="262" cy="211" r="8" fill="#16a34a"/>
  <text x="278" y="215" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a" font-weight="600">LOW</text>
  <text x="278" y="230" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Funded company, paid engineering team</text>
  <circle cx="506" cy="211" r="8" fill="#f59e0b"/>
  <text x="522" y="215" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" font-weight="600">MODERATE</text>
  <text x="522" y="230" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Community-led, growing fast</text>

  <line x1="16" y1="234" x2="704" y2="234" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="244" y1="188" x2="244" y2="234" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="488" y1="188" x2="488" y2="234" stroke="#f1f5f9" stroke-width="1"/>

  <!-- ── ROW 4: Bus factor ── -->
  <rect x="16" y="234" width="688" height="46" rx="0" fill="#fafafa"/>
  <text x="28" y="262" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0f172a">Bus factor</text>
  <circle cx="262" cy="257" r="8" fill="#16a34a"/>
  <text x="278" y="261" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a" font-weight="600">LOW</text>
  <text x="278" y="276" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Engineering team, not single-person</text>
  <circle cx="506" cy="257" r="8" fill="#dc2626"/>
  <text x="522" y="261" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626" font-weight="600">HIGH</text>
  <text x="522" y="276" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Single primary maintainer</text>

  <line x1="16" y1="280" x2="704" y2="280" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="244" y1="234" x2="244" y2="280" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="488" y1="234" x2="488" y2="280" stroke="#f1f5f9" stroke-width="1"/>

  <!-- ── ROW 5: SLA / support ── -->
  <rect x="16" y="280" width="688" height="46" rx="0" fill="white"/>
  <text x="28" y="308" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0f172a">SLA / support</text>
  <circle cx="262" cy="303" r="8" fill="#16a34a"/>
  <text x="278" y="307" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a" font-weight="600">AVAILABLE</text>
  <text x="278" y="322" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Paid tier includes support contracts</text>
  <circle cx="506" cy="303" r="8" fill="#f59e0b"/>
  <text x="522" y="307" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" font-weight="600">COMMUNITY</text>
  <text x="522" y="322" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">GitHub issues + Discord, no SLA</text>

  <line x1="16" y1="326" x2="704" y2="326" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="244" y1="280" x2="244" y2="326" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="488" y1="280" x2="488" y2="326" stroke="#f1f5f9" stroke-width="1"/>

  <!-- ── ROW 6: Forkability ── -->
  <rect x="16" y="326" width="688" height="46" rx="0" fill="#fafafa"/>
  <text x="28" y="354" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0f172a">Forkability if direction changes</text>
  <circle cx="262" cy="349" r="8" fill="#dc2626"/>
  <text x="278" y="353" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626" font-weight="600">LOW</text>
  <text x="278" y="368" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Complex Python monolith, 9 years old</text>
  <circle cx="506" cy="349" r="8" fill="#16a34a"/>
  <text x="522" y="353" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a" font-weight="600">HIGH</text>
  <text x="522" y="368" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Clean Java/Quarkus · MIT licence</text>

  <line x1="16" y1="372" x2="704" y2="372" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="244" y1="326" x2="244" y2="372" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="488" y1="326" x2="488" y2="372" stroke="#f1f5f9" stroke-width="1"/>

  <!-- ── ROW 7: Vendor lock-in ── -->
  <rect x="16" y="372" width="688" height="46" rx="0" fill="white"/>
  <text x="28" y="400" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0f172a">Vendor relationship required</text>
  <circle cx="262" cy="395" r="8" fill="#f59e0b"/>
  <text x="278" y="399" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" font-weight="600">YES</text>
  <text x="278" y="414" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Account, token, contract, renewal</text>
  <circle cx="506" cy="395" r="8" fill="#16a34a"/>
  <text x="522" y="399" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a" font-weight="600">NONE</text>
  <text x="522" y="414" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">No account, no dependency</text>

  <!-- Outer border around rows -->
  <rect x="16" y="96" width="688" height="322" rx="0" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Legend -->
  <rect x="16" y="424" width="688" height="16" rx="4" fill="none"/>
  <circle cx="230" cy="432" r="6" fill="#dc2626"/>
  <text x="242" y="436" font-family="system-ui,sans-serif" font-size="11" fill="#475569">High risk</text>
  <circle cx="320" cy="432" r="6" fill="#f59e0b"/>
  <text x="332" y="436" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Moderate</text>
  <circle cx="414" cy="432" r="6" fill="#16a34a"/>
  <text x="426" y="436" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Low / positive</text>
</svg>
