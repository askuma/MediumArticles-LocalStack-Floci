<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" width="720" height="560">
  <!-- Background -->
  <rect width="720" height="560" fill="#f8fafc" rx="16" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="40" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="700" fill="#0f172a">The Four-Layer Hybrid Model</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#94a3b8">Developer laptop / CI runner</text>

  <!-- ═══ LAYER 1: Floci ═══ -->
  <rect x="16" y="74" width="688" height="112" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <rect x="16" y="74" width="7" height="112" rx="4" fill="#3b82f6"/>
  <!-- Layer badge -->
  <rect x="34" y="90" width="32" height="22" rx="4" fill="#3b82f6"/>
  <text x="50" y="105" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">L1</text>
  <!-- Usage tag (right side) -->
  <rect x="574" y="88" width="118" height="24" rx="12" fill="#dbeafe" stroke="#bfdbfe" stroke-width="1"/>
  <text x="633" y="104" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#1d4ed8">ALL TEAMS</text>
  <!-- Layer name -->
  <text x="82" y="104" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f172a">Floci  (port 4566)  ·  MIT  ·  No auth  ·  24 ms startup</text>
  <!-- Services -->
  <text x="82" y="124" font-family="system-ui,sans-serif" font-size="12" fill="#1e40af">SQS · SNS · S3 · DynamoDB · SSM · Secrets Manager · KMS · Cognito · API Gateway</text>
  <text x="82" y="142" font-family="system-ui,sans-serif" font-size="12" fill="#1e40af">EventBridge · CloudWatch · Step Functions · Route53 · Kinesis · CloudFormation</text>
  <text x="82" y="160" font-family="system-ui,sans-serif" font-size="12" fill="#475569">Lambda · RDS · ElastiCache · ECS · EKS · MSK  (via real Docker containers)</text>

  <!-- ═══ LAYER 2: Specialist Tools ═══ -->
  <rect x="16" y="200" width="688" height="92" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <rect x="16" y="200" width="7" height="92" rx="4" fill="#22c55e"/>
  <rect x="34" y="214" width="32" height="22" rx="4" fill="#22c55e"/>
  <text x="50" y="229" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">L2</text>
  <rect x="540" y="212" width="152" height="24" rx="12" fill="#dcfce7" stroke="#bbf7d0" stroke-width="1"/>
  <text x="616" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#15803d">EDGE CASE TESTS</text>
  <text x="82" y="228" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f172a">Specialist Tools</text>
  <text x="82" y="248" font-family="system-ui,sans-serif" font-size="12" fill="#166534">DynamoDB Local  ·  ElasticMQ  ·  S3Mock (Adobe)  ·  moto (standalone server)</text>
  <text x="82" y="266" font-family="system-ui,sans-serif" font-size="12" fill="#475569">Run alongside Floci for higher-fidelity edge cases — FIFO SQS ordering, DynamoDB transactions</text>

  <!-- ═══ LAYER 3: LocalStack Paid ═══ -->
  <rect x="16" y="306" width="688" height="92" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <rect x="16" y="306" width="7" height="92" rx="4" fill="#f59e0b"/>
  <rect x="34" y="320" width="32" height="22" rx="4" fill="#f59e0b"/>
  <text x="50" y="335" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">L3</text>
  <rect x="528" y="318" width="164" height="24" rx="12" fill="#fef9c3" stroke="#fde68a" stroke-width="1"/>
  <text x="610" y="334" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#92400e">IAC ENGINEERS ONLY</text>
  <text x="82" y="334" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f172a">LocalStack Paid   (transitional)</text>
  <text x="82" y="354" font-family="system-ui,sans-serif" font-size="12" fill="#92400e">cdklocal deploy  ·  Terraform provider  ·  Cloud Pods  ·  IaC validation workflows</text>
  <text x="82" y="372" font-family="system-ui,sans-serif" font-size="12" fill="#475569">~5 licences at $39/seat/month  ·  Review annually as Floci IaC integration matures</text>

  <!-- ═══ LAYER 4: AWS Sandbox ═══ -->
  <rect x="16" y="412" width="688" height="92" rx="8" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <rect x="16" y="412" width="7" height="92" rx="4" fill="#a855f7"/>
  <rect x="34" y="426" width="32" height="22" rx="4" fill="#a855f7"/>
  <text x="50" y="441" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">L4</text>
  <rect x="542" y="424" width="150" height="24" rx="12" fill="#f3e8ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="617" y="440" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#6b21a8">IAM TESTS ONLY</text>
  <text x="82" y="440" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f172a">AWS Sandbox Accounts</text>
  <text x="82" y="460" font-family="system-ui,sans-serif" font-size="12" fill="#6b21a8">OIDC credentials  ·  Per-team sandbox accounts  ·  Budget controls  ·  Automated cleanup</text>
  <text x="82" y="478" font-family="system-ui,sans-serif" font-size="12" fill="#475569">IAM policy enforcement, SCPs, permission boundaries — emulators cannot replicate these</text>

  <!-- ═══ Footer ═══ -->
  <rect x="16" y="522" width="688" height="24" rx="6" fill="#f1f5f9"/>
  <text x="360" y="538" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Layer 3 is transitional — scope narrows as Floci IaC coverage matures over 12–24 months  ·  Layer 4 cost is typically cents per pipeline run</text>
</svg>
